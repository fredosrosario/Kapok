async function post(action,p={},pincode=''){const r=await fetch(api,{method:'POST',headers:{'Content-Type':'application/json',...(pincode?{'x-coach-pin':pincode}:{})},body:JSON.stringify({action,...p})});const j=await r.json();if(!r.ok)throw Error(j.error||'Failed');return j}
async function load(silent=false){if(loading||saving)return;loading=true;try{state=(await post('getState')).state;render()}catch(e){if(!silent)document.querySelector('#app').innerHTML='<main><div class=card>'+e.message+'</div></main>'}finally{loading=false}} load();setInterval(()=>{let el=document.activeElement;if(!document.hidden&&(!el||!['INPUT','TEXTAREA','SELECT'].includes(el.tagName)))load(true)},3000);
function B(fn,id,text,cls='soft'){return '<button class="'+cls+'" data-id="'+id+'" onclick="'+fn+'(this.dataset.id)">'+text+'</button>'}
function head(title){let h=title==='門票結餘'?t('parentTitle'):title==='門票管理'?t('coachTitle'):title;return '<div class=top><img class=mark src="'+logo+'" alt="Kapok logo"><div class=brand><b>Macau Kapok Swimming Club</b><span>'+h+'</span></div><button class=ghost onclick="toggleLang()">'+(lang==='zh'?'EN':'中')+'</button></div>'}
function toggleLang(){lang=lang==='zh'?'en':'zh';localStorage.kapokLang=lang;render()} function go(){location.hash='coach'} function setTab(k){tab=k;render()} function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function render(){if(!state)return;route='coach';document.querySelector('#app').innerHTML=coach()}
function parent(){let rows=visible().filter(x=>x.swimmer.name.includes(search));return head('門票結餘')+'<main><div class=card><input placeholder="'+t('search')+'" oninput="search=this.value;render()" value="'+esc(search)+'"></div><div class=card>'+(rows.length?rows.map(parentRow).join(''):'<div class=empty>'+t('none')+'</div>')+'</div></main>'}
function parentRow(x){let b=x.balance,p=x.pendingTotal,cls=b<0?'neg':b>0?'pos':'zero',txt=b<0?t('owe')+-b:b>0?t('credit')+b:t('clear'),btn=b<0?t('pay'):t('topup');return '<div class=row><div><div class=name>'+esc(x.swimmer.name)+(p?'<span class=pill>'+t('pending')+p+'</span>':'')+'</div><div class=sub>'+t('recent')+'</div></div><div><div class="amt '+cls+'">'+txt+'</div>'+B('pay',x.swimmer.id,btn)+'</div><div class=detail>'+ledger(x.swimmer.id,true)+'</div></div>'}
async function pay(id){let s=sw(id),a=Number(prompt(t('amountPrompt')));if(!Number.isInteger(a)||a<=0)return alert(t('badAmount'));if(!confirm(t('confirmPaid')+s.name+' MOP '+a+'?'))return;state=(await post('submitPayment',{swimmerId:id,amount:a})).state;render();alert(t('registered'))}
function coach(){if(tab==='pending')tab='attendance';if(!unlocked)return head('門票管理')+'<main><div class=card><h3>'+t('coachPin')+'</h3><input id=p type=password inputmode=numeric placeholder="PIN"><br><br><button onclick="login()">'+t('enter')+'</button></div></main>';return head('門票管理')+'<main>'+pane()+'</main><div class=tabs style="grid-template-columns:repeat(4,1fr)">'+['attendance:'+t('attendance'),'balances:'+t('balances'),'message:'+t('message'),'settings:'+t('settings')].map(x=>{let [k,v]=x.split(':');return '<button class="'+(tab===k?'on':'')+'" data-tab="'+k+'" onclick="setTab(this.dataset.tab)">'+v+'</button>'}).join('')+'</div>'}
async function login(){let v=document.querySelector('#p').value;let ok=(await post('verifyPin',{},v)).ok;if(!ok)return alert(t('badPin'));pin=v;localStorage.kapokPin=v;unlocked=true;render()}
function pane(){return tab==='balances'?balances():tab==='message'?message():tab==='settings'?settings():attendance()}
function attendance(){let valid=isSwim(date),editable=canTick(date),list=active().filter(s=>s.name.includes(search)),count=attCount(date),total=attMoney(date),disabled=!editable;return '<section class=coach-hero><div class=datebar><button class=navbtn onclick="jumpDay(-1)" aria-label="'+L('上一日','Previous day')+'">‹</button><div class=datecenter><div class=daytitle>'+dateTitle(date)+'</div><div class=daymeta '+(valid?'ok':'warn')+'>'+dayStatus(date)+'</div></div><button class=navbtn onclick="jumpDay(1)" aria-label="'+L('下一日','Next day')+'">›</button></div><div class=herofoot><button class=todaybtn onclick="goToday()" '+(date===today()?'disabled':'')+'>'+L('回到今日','Back to today')+'</button><div class=countbubble><b>'+count+'</b><span>'+L('已點名','selected')+'</span></div></div><div class=savebar aria-live="polite">'+(saveMsg||L('點泳員即可記錄出席','Tap swimmers to mark attendance'))+(total?'<span>MOP '+total+'</span>':'')+'</div></section><section class=tools><input class=search placeholder="'+t('search')+'" value="'+esc(search)+'" oninput="search=this.value;render()"><div class=addline><input id=newname placeholder="'+t('newName')+'"><button '+(disabled?'disabled':'')+' onclick="quickAdd()">'+t('addAttend')+'</button></div>'+(valid?'':'<p class=hint>'+dayStatus(date)+' · '+(editable?L('非游泳日，但仍可補記出席。','Not a swim day, but you can still record attendance.'):L('未來日期不可記錄出席。','Future dates cannot be marked.'))+'</p>')+'</section><section class=listcard>'+(list.length?list.map(attRow).join(''):'<div class=empty>'+t('none')+'</div>')+'</section>'}
function attRow(s){let r=att(s.id,date),sp=spend30(s.id),valid=canTick(date),cls=r?' is-present':'';return '<div class="att-row'+cls+(valid?'':' is-disabled')+'" role="button" tabindex="0" aria-pressed="'+(r?'true':'false')+'" aria-disabled="'+(!valid)+'" data-id="'+s.id+'" onclick="tog(this.dataset.id)" onkeydown="rowKey(event,this.dataset.id)"><div class=swimmer><div class=name>'+esc(s.name)+'</div><div class=sub>'+L('近30日','30 days')+' MOP '+sp+' · '+t('usual')+s.usualPrice+'</div></div><div class=row-actions onclick="event.stopPropagation()">'+(r?'<input class=price-input aria-label="'+L('票價','Ticket price')+'" inputmode=numeric data-id="'+r.id+'" value="'+r.amount+'" onclick="event.stopPropagation()" onchange="price(this.dataset.id,this.value)">':'<span class=price-chip>MOP '+s.usualPrice+'</span>')+'<button class="toggle '+(r?'present':'absent')+'" '+(valid?'':'disabled')+' onclick="event.stopPropagation();tog(\''+s.id+'\')">'+(r?'✓ '+t('attended'):t('notAttended'))+'</button></div></div>'}
function rowKey(e,id){if(e.key==='Enter'||e.key===' '){e.preventDefault();tog(id)}}
async function quickAdd(){let n=document.querySelector('#newname').value.trim();if(!n||!canTick(date))return;if(state.swimmers.some(s=>s.name===n&&!s.archived))return alert(t('nameExists'));let prev=cloneState(),s=state.swimmers.find(s=>s.name===n);if(s)s.archived=false;else{ s={id:crypto.randomUUID(),name:n,usualPrice:15,archived:false,createdAt:new Date().toISOString(),order:state.swimmers.length};state.swimmers.push(s)}addAtt(s.id,date,s.usualPrice);saving=true;saveMsg=L('儲存中...','Saving...');render();try{await save();saving=false;saveMsg=L('已儲存','Saved');render();clearSaveMsg()}catch(e){state=prev;saving=false;saveMsg=L('未能儲存','Save failed');render();alert(saveMsg)}}
async function tog(id){if(!canTick(date))return;let prev=cloneState(),r=att(id,date);if(r){state.attendance=state.attendance.filter(x=>x.id!==r.id);state.transactions=state.transactions.filter(x=>x.attendanceId!==r.id)}else addAtt(id,date,sw(id).usualPrice);saving=true;saveMsg=L('儲存中...','Saving...');render();try{await save();saving=false;saveMsg=L('已儲存','Saved');render();clearSaveMsg()}catch(e){state=prev;saving=false;saveMsg=L('未能儲存','Save failed');render();alert(saveMsg)}}
function addAtt(swimmerId,d,amount){let r={id:crypto.randomUUID(),swimmerId,date:d,amount,rememberPrice:true,createdAt:new Date().toISOString()};state.attendance.push(r);state.transactions.push({id:crypto.randomUUID(),swimmerId,attendanceId:r.id,type:'attendance',amount:-amount,date:d+'T12:00:00+08:00',label:'英才門票',reason:'',createdAt:new Date().toISOString()})}
async function price(id,v){let a=Number(v);if(!Number.isInteger(a)||a<=0)return;let prev=cloneState(),r=state.attendance.find(x=>x.id===id);r.amount=a;let tx=state.transactions.find(x=>x.attendanceId===id);if(tx)tx.amount=-a;sw(r.swimmerId).usualPrice=a;saving=true;saveMsg=L('儲存中...','Saving...');try{await save();saving=false;saveMsg=L('已儲存','Saved');render();clearSaveMsg()}catch(e){state=prev;saving=false;saveMsg=L('未能儲存','Save failed');render();alert(saveMsg)}}
function pending(){let ps=state.pendingPayments.filter(p=>p.status==='pending').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return '<div class=card><h3>'+t('pendingTab')+'</h3>'+(ps.length?ps.map(p=>'<div class=row><div><div class=name>'+esc(sw(p.swimmerId).name)+' <span class=pill>MOP '+p.amount+'</span></div><div class=sub>'+dt(p.createdAt)+'</div></div><div>'+B('conf',p.id,t('confirm'))+' '+B('rej',p.id,t('reject'),'bad')+'</div></div>').join(''):'<div class=empty>'+t('noPending')+'</div>')+'</div>'}
async function conf(id){let p=state.pendingPayments.find(x=>x.id===id);p.status='confirmed';p.confirmedAt=new Date().toISOString();state.transactions.push({id:crypto.randomUUID(),swimmerId:p.swimmerId,pendingPaymentId:p.id,type:'payment',amount:p.amount,date:p.confirmedAt,label:'MP payment',reason:'',createdAt:p.confirmedAt});await save();render()}
async function rej(id){let p=state.pendingPayments.find(x=>x.id===id);p.status='rejected';p.rejectedAt=new Date().toISOString();await save();render()}
function balances(){let rows=[...state.swimmers].sort((a,b)=>bal(a.id)-bal(b.id)).filter(s=>s.name.includes(search));return '<div class=card><h3>'+t('balances')+'</h3><input placeholder="'+t('search')+'" value="'+esc(search)+'" oninput="search=this.value;render()"></div><div class=card>'+rows.map(s=>{let b=bal(s.id);return '<div class=row><div><div class=name>'+esc(s.name)+(s.archived?' <span class=pill>已封存</span>':'')+'</div><div class=sub>'+t('usual')+''+s.usualPrice+'</div></div><div><div class="amt '+(b<0?'neg':b>0?'pos':'zero')+'">'+(b>0?'+':'')+'MOP '+b+'</div>'+B('manual',s.id,t('txn'))+'</div><div class=detail>'+ledger(s.id,false)+'</div></div>'}).join('')+'</div>'}
async function manual(id){let type=prompt(t('manualType'),'payment');let a=Number(prompt(t('amount')));let reason=prompt(t('reason'),'');if(!Number.isInteger(a)||a<=0||!reason)return alert(t('needReason'));let amount=(type==='refund'||type==='charge')?-a:a;if(type==='refund'&&a>Math.max(0,bal(id)))return alert(t('refundLimit'));state.transactions.push({id:crypto.randomUUID(),swimmerId:id,type:type==='credit'||type==='charge'?'correction':type,amount,date:new Date().toISOString(),label:type,reason,createdAt:new Date().toISOString()});await save();render()}
function message(){let out=msg(month);return '<div class=card><h3>'+t('monthMsg')+'</h3><input type=month value="'+month+'" onchange="month=this.value;render()"></div><div class=card><textarea id=mtext style="min-height:260px" readonly>'+esc(out)+'</textarea><br><br><button id=copyBtn onclick="copyMsg()">'+t('copy')+'</button><span id=copyState class=hint aria-live="polite"></span></div>'} async function copyMsg(){let text=document.querySelector('#mtext').value,btn=document.querySelector('#copyBtn'),stateEl=document.querySelector('#copyState');try{await navigator.clipboard.writeText(text);btn.textContent=t('copied');btn.classList.add('soft');stateEl.textContent=' '+t('copied');setTimeout(()=>{btn.textContent=t('copy');btn.classList.remove('soft');if(stateEl)stateEl.textContent=''},1600)}catch(e){document.querySelector('#mtext').select();stateEl.textContent=' '+t('copyFailed');alert(t('copyFailed'))}}
function settings(){return '<div class=card><h3>'+t('settings')+'</h3><button onclick="chgPin()">'+t('changePin')+'</button><p class=sub>'+api+'</p></div><div class=card>'+state.swimmers.map(s=>'<div class=row><div><div class=name>'+esc(s.name)+'</div><div class=sub>'+ (s.archived?t('archived'):t('active')) +' · MOP '+s.usualPrice+'</div></div><div>'+B('editSw',s.id,t('edit'),'ghost')+' '+B('arch',s.id,s.archived?t('restore'):t('archive'),'bad')+' '+B('delSw',s.id,L('刪除','Delete'),'bad')+'</div></div>').join('')+'</div>'}
async function editSw(id){let s=sw(id),n=prompt(t('newName'),s.name),p=Number(prompt(t('usual'),s.usualPrice));if(!n||!Number.isInteger(p)||p<=0)return;if(state.swimmers.some(x=>x.id!==id&&x.name===n))return alert(t('nameExists'));s.name=n;s.usualPrice=p;await save();render()} async function arch(id){sw(id).archived=!sw(id).archived;await save();render()} async function delSw(id){let s=sw(id);if(!confirm(L('確定刪除 '+s.name+'？所有出席及交易紀錄也會刪除。','Delete '+s.name+'? All attendance and transactions will be deleted.')))return;state.swimmers=state.swimmers.filter(x=>x.id!==id);state.attendance=state.attendance.filter(x=>x.swimmerId!==id);state.transactions=state.transactions.filter(x=>x.swimmerId!==id);state.pendingPayments=state.pendingPayments.filter(x=>x.swimmerId!==id);await save();render()} async function chgPin(){let old=prompt(t('currentPin'));if(old!==state.pin)return alert(t('badPin'));let np=prompt(t('newPin'));if(!np||np.length<3)return;state.pin=np;await save(old);pin=np;localStorage.kapokPin=np;render()}
async function save(p=pin){state=(await post('saveState',{state},p)).state}
function sw(id){return state.swimmers.find(s=>s.id===id)||{name:'?'}} function att(id,d){return state.attendance.find(r=>r.swimmerId===id&&r.date===d)} function bal(id,end){return state.transactions.filter(t=>t.swimmerId===id&&(!end||new Date(t.date)<=end)).reduce((s,t)=>s+t.amount,0)} function pend(id){return state.pendingPayments.filter(p=>p.swimmerId===id&&p.status==='pending').reduce((s,p)=>s+p.amount,0)}
function visible(){let cut=Date.now()-60*864e5;return state.swimmers.map(swimmer=>({swimmer,balance:bal(swimmer.id),pendingTotal:pend(swimmer.id),last:last(swimmer.id)})).filter(x=>x.balance!==0||x.pendingTotal||x.last>=cut).sort((a,b)=>a.balance<0&&b.balance<0?a.balance-b.balance:a.balance>0&&b.balance>0?b.balance-a.balance:a.balance<0?-1:b.balance<0?1:a.balance>0?-1:b.balance>0?1:0)}
function active(){return state.swimmers.filter(s=>!s.archived).sort((a,b)=>spend30(b.id)-spend30(a.id)||last(b.id)-last(a.id)||a.order-b.order)} function spend30(id){let cut=Date.now()-30*864e5;return state.transactions.filter(t=>t.swimmerId===id&&t.type==='attendance'&&new Date(t.date)>=cut).reduce((s,t)=>s+Math.abs(t.amount),0)} function last(id){let ds=state.attendance.filter(r=>r.swimmerId===id).map(r=>new Date(r.date+'T12:00:00+08:00').getTime());return ds.length?Math.max(...ds):0}
function ledger(id,recent){let months=[new Date().toISOString().slice(0,7)];let d=new Date();d.setMonth(d.getMonth()-1);months.push(d.toISOString().slice(0,7));let rows=[...state.transactions.filter(t=>t.swimmerId===id&&(!recent||months.includes(t.date.slice(0,7)))),...state.pendingPayments.filter(p=>p.swimmerId===id&&p.status==='pending').map(p=>({date:p.createdAt,label:'待確認',amount:p.amount,reason:'',pending:true}))].sort((a,b)=>new Date(b.date)-new Date(a.date));return rows.length?rows.map(r=>'<div class=line style="grid-template-columns:auto 1fr auto auto auto"><span>'+r.date.slice(5,10)+'</span><span>'+esc(r.label)+(r.reason?' · '+esc(r.reason):'')+'</span><b class="'+(r.amount<0?'neg':'pos')+'">'+(r.amount<0?'-':'+')+'MOP '+Math.abs(r.amount)+'</b>'+(r.pending||r.type==='void'||voided(r.id)?'':B('voidTx',r.id,L('取消','Void'),'bad'))+(r.pending?'':B('delTx',r.id,L('刪除','Delete'),'bad'))+'</div>').join(''):'<div class=empty>'+t('none')+'</div>'}
function voided(id){return state.transactions.some(t=>t.voidOf===id)}
async function voidTx(id){let tx=state.transactions.find(t=>t.id===id);if(!tx||tx.type==='void'||voided(id))return;if(!confirm(L('確定取消這筆交易？','Void this transaction?')))return;let now=new Date().toISOString();state.transactions.push({id:crypto.randomUUID(),swimmerId:tx.swimmerId,type:'void',amount:-tx.amount,date:now,label:'void',reason:tx.label||tx.type,voidOf:tx.id,createdAt:now});await save();render()}
async function delTx(id){let tx=state.transactions.find(t=>t.id===id);if(!tx)return;if(!confirm(L('確定刪除這筆交易？此動作不能復原。','Delete this transaction? This cannot be undone.')))return;state.transactions=state.transactions.filter(t=>t.id!==id&&t.voidOf!==id);if(tx.attendanceId)state.attendance=state.attendance.filter(r=>r.id!==tx.attendanceId);await save();render()}
function owedMonths(id,m){let end=monthEnd(m),buckets={},keys=[],credit=0;state.transactions.filter(t=>t.swimmerId===id&&new Date(t.date)<=end).sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(t=>{let k=t.date.slice(0,7);if(!Object.prototype.hasOwnProperty.call(buckets,k)){buckets[k]=0;keys.push(k)}if(t.amount<0){let due=-t.amount,use=Math.min(credit,due);credit-=use;due-=use;if(due)buckets[k]+=due}else if(t.amount>0){let c=t.amount;keys.sort().forEach(x=>{let use=Math.min(buckets[x],c);buckets[x]-=use;c-=use});credit+=c}});return keys.filter(k=>k<=m&&buckets[k]>0).sort().map(k=>({m:k,a:buckets[k]}))} function monthEnd(m){let [y,mo]=m.split('-').map(Number);return new Date(Date.UTC(y,mo,0,15,59,59))} function monthLabel(m){return Number(m.split('-')[1])+'月'} function msg(m){let [y,mo]=m.split('-').map(Number),rows=state.swimmers.map(s=>({s,months:owedMonths(s.id,m)})).map(x=>({...x,total:x.months.reduce((sum,row)=>sum+row.a,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total),lines=[y+'年'+mo+'月份英才門票。'];rows.forEach(x=>{if(x.months.length===1)lines.push(x.s.name+x.total+'元');else lines.push(x.s.name,x.months.map(r=>monthLabel(r.m)+r.a+'元').join(''),'共'+x.total+'元')});lines.push('','請大家MP轉給我。','註了名不用再給訊息');return lines.join(String.fromCharCode(10))}
function cloneState(){return JSON.parse(JSON.stringify(state))} function clearSaveMsg(){setTimeout(()=>{if(!saving){saveMsg='';render()}},1200)} function dateObj(x){return new Date(x+'T12:00:00+08:00')} function iso(d){return d.toISOString().slice(0,10)} function today(){return new Intl.DateTimeFormat('sv-SE',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date())} function defaultDate(){let d=new Date();while(![0,1,4].includes(d.getDay()))d.setDate(d.getDate()-1);return iso(d)} function canTick(x){return x<=today()} function isSwim(x){let d=dateObj(x);return x<=today()&&[0,1,4].includes(d.getDay())} function jumpDay(n){let d=dateObj(date);d.setDate(d.getDate()+n);date=iso(d);render()} function goToday(){date=today();render()} function dateTitle(x){return new Intl.DateTimeFormat(lang==='zh'?'zh-Hant-MO':'en-US',{timeZone:TZ,weekday:'short',month:'short',day:'numeric'}).format(dateObj(x))} function dayStatus(x){if(x>today())return L('未來日期','future date');return [0,1,4].includes(dateObj(x).getDay())?L('游泳日','swim day'):L('非游泳日','not a swim day')} function attCount(d){return state.attendance.filter(r=>r.date===d).length} function attMoney(d){return state.attendance.filter(r=>r.date===d).reduce((s,r)=>s+Number(r.amount||0),0)} function dt(x){return new Intl.DateTimeFormat('zh-Hant-MO',{timeZone:TZ,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(x))}
</script></body></html>
