<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Macau Kapok Swimming Club</title><style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC",sans-serif;color:#202124;background:#fbfbfc;--a:#f46468;--b:#d94d52;--l:#e6e7eb;--m:#70757d;--g:#0c8b5f;--r:#c8333a}*{box-sizing:border-box}body{margin:0;background:#fbfbfc}.top{position:sticky;top:0;z-index:2;display:flex;gap:10px;align-items:center;padding:10px 14px;background:#fff;border-bottom:1px solid var(--l)}.mark{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--a);color:white;font-weight:900}.brand{flex:1;min-width:0}.brand b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand span{font-size:12px;color:var(--m)}main{max-width:720px;margin:0 auto;padding:14px 14px 78px}.card{background:#fff;border:1px solid var(--l);border-radius:8px;padding:12px;margin-bottom:12px;box-shadow:0 8px 24px #0000000a}button{border:0;border-radius:8px;padding:9px 12px;background:var(--a);color:white;font-weight:800}button.ghost{background:#fff;color:#202124;border:1px solid var(--l)}button.soft{background:#fff0f1;color:var(--b)}button.bad{background:#fff2f2;color:var(--r)}input,select,textarea{width:100%;border:1px solid var(--l);border-radius:8px;padding:10px;font:inherit;background:white}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 2px;border-bottom:1px solid var(--l)}.row:last-child{border:0}.name{font-weight:900}.sub{font-size:12px;color:var(--m);margin-top:4px}.amt{font-weight:900;text-align:right}.neg{color:var(--r)}.pos{color:var(--g)}.zero{color:var(--m)}.pill{display:inline-block;border-radius:999px;background:#fff6df;color:#a46a00;padding:3px 8px;font-size:12px;font-weight:800;margin-left:5px}.tabs{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-top:1px solid var(--l)}.tabs button{height:58px;background:white;color:var(--m);border-radius:0;font-size:12px}.tabs button.on{color:var(--b)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.empty{text-align:center;color:var(--m);padding:22px 6px}.detail{grid-column:1/-1;background:#fafafa;border:1px solid var(--l);border-radius:8px;padding:9px}.line{display:grid;grid-template-columns:auto 1fr auto;gap:8px;border-bottom:1px dashed #ddd;padding:7px 0;font-size:13px}.line:last-child{border:0}@media(max-width:390px){main{padding:10px 10px 78px}.grid{grid-template-columns:1fr}}
</style></head><body><div id="app"></div><script>
const api='https://arofxbakiefibzkzdgiq.supabase.co/functions/v1/kapok',parentLink='https://fredosrosario.github.io/Kapok/#parent',TZ='Asia/Macau';let state=null,route=location.hash.includes('coach')?'coach':'parent',tab='attendance',pin=localStorage.kapokPin||'',unlocked=false,search='',date=defaultDate(),month=new Date().toISOString().slice(0,7),loading=false;
window.onhashchange=()=>{route=location.hash.includes('coach')?'coach':'parent';render()};
async function post(action,p={},pincode=''){const r=await fetch(api,{method:'POST',headers:{'Content-Type':'application/json',...(pincode?{'x-coach-pin':pincode}:{})},body:JSON.stringify({action,...p})});const j=await r.json();if(!r.ok)throw Error(j.error||'Failed');return j}
async function load(silent=false){if(loading)return;loading=true;try{state=(await post('getState')).state;render()}catch(e){if(!silent)document.querySelector('#app').innerHTML='<main><div class=card>'+e.message+'</div></main>'}finally{loading=false}} load();setInterval(()=>{let el=document.activeElement;if(!document.hidden&&(!el||!['INPUT','TEXTAREA','SELECT'].includes(el.tagName)))load(true)},3000);
function B(fn,id,text,cls='soft'){return '<button class="'+cls+'" data-id="'+id+'" onclick="'+fn+'(this.dataset.id)">'+text+'</button>'}
function head(title){return '<div class=top><div class=mark>木</div><div class=brand><b>Macau Kapok Swimming Club</b><span>'+title+'</span></div><button class=ghost onclick="go()">'+(route==='coach'?'家長':'教練')+'</button></div>'}
function go(){location.hash=route==='coach'?'parent':'coach'} function setTab(k){tab=k;render()} function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function render(){if(!state)return;document.querySelector('#app').innerHTML=route==='coach'?coach():parent()}
function parent(){let rows=visible().filter(x=>x.swimmer.name.includes(search));return head('門票結餘')+'<main><div class=card><input placeholder="搜尋泳員" oninput="search=this.value;render()" value="'+esc(search)+'"></div><div class=card>'+(rows.length?rows.map(parentRow).join(''):'<div class=empty>暫時沒有需要顯示的泳員。</div>')+'</div></main>'}
function parentRow(x){let b=x.balance,p=x.pendingTotal,cls=b<0?'neg':b>0?'pos':'zero',txt=b<0?'欠 MOP '+-b:b>0?'餘 MOP '+b:'已清',btn=b<0?'入數':'增值';return '<div class=row><div><div class=name>'+esc(x.swimmer.name)+(p?'<span class=pill>待確認 MOP '+p+'</span>':'')+'</div><div class=sub>本月及上月紀錄</div></div><div><div class="amt '+cls+'">'+txt+'</div>'+B('pay',x.swimmer.id,btn)+'</div><div class=detail>'+ledger(x.swimmer.id,true)+'</div></div>'}
async function pay(id){let s=sw(id),a=Number(prompt('請輸入金額 / Amount'));if(!Number.isInteger(a)||a<=0)return alert('請輸入正整數金額');if(!confirm('確認已為 '+s.name+' 登記 '+a+' 元？'))return;state=(await post('submitPayment',{swimmerId:id,amount:a})).state;render();alert('已登記，待教練確認。')}
function coach(){if(!unlocked)return head('門票管理')+'<main><div class=card><h3>教練 PIN</h3><input id=p type=password inputmode=numeric placeholder="PIN"><br><br><button onclick="login()">進入</button></div></main>';return head('門票管理')+'<main>'+pane()+'</main><div class=tabs>'+['attendance:出席','pending:待確認','balances:結餘','message:訊息','settings:設定'].map(x=>{let [k,v]=x.split(':');return '<button class="'+(tab===k?'on':'')+'" data-tab="'+k+'" onclick="setTab(this.dataset.tab)">'+v+'</button>'}).join('')+'</div>'}
async function login(){let v=document.querySelector('#p').value;let ok=(await post('verifyPin',{},v)).ok;if(!ok)return alert('PIN 不正確');pin=v;localStorage.kapokPin=v;unlocked=true;render()}
function pane(){return tab==='pending'?pending():tab==='balances'?balances():tab==='message'?message():tab==='settings'?settings():attendance()}
function attendance(){let valid=isSwim(date),list=active().filter(s=>s.name.includes(search));return '<div class=card><h3>出席</h3><div class=grid><input type=date max="'+today()+'" value="'+date+'" onchange="date=this.value;render()"><input placeholder="搜尋泳員" value="'+esc(search)+'" oninput="search=this.value;render()"></div><br><div class=grid><input id=newname placeholder="姓名"><button '+(valid?'':'disabled')+' onclick="quickAdd()">新增並記錄出席</button></div>'+(valid?'':'<p class=sub>只可選星期一、四、日，且不可選未來日期。</p>')+'</div><div class=card>'+list.map(attRow).join('')+'</div>'}
function attRow(s){let r=att(s.id,date),sp=spend30(s.id);return '<div class=row><div><div class=name>'+esc(s.name)+'</div><div class=sub>30日 MOP '+sp+' · 常用票價 MOP '+s.usualPrice+'</div></div>'+B('tog',s.id,r?'已出席':'未出席',r?'bad':'soft')+(r?'<div class=detail><input inputmode=numeric data-id="'+r.id+'" value="'+r.amount+'" onchange="price(this.dataset.id,this.value)"></div>':'')+'</div>'}
async function quickAdd(){let n=document.querySelector('#newname').value.trim();if(!n)return;if(state.swimmers.some(s=>s.name===n&&!s.archived))return alert('已有相同姓名');let s=state.swimmers.find(s=>s.name===n);if(s)s.archived=false;else{ s={id:crypto.randomUUID(),name:n,usualPrice:15,archived:false,createdAt:new Date().toISOString(),order:state.swimmers.length};state.swimmers.push(s)}addAtt(s.id,date,s.usualPrice);await save();render()}
async function tog(id){let r=att(id,date);if(r){state.attendance=state.attendance.filter(x=>x.id!==r.id);state.transactions=state.transactions.filter(x=>x.attendanceId!==r.id)}else addAtt(id,date,sw(id).usualPrice);await save();render()}
function addAtt(swimmerId,d,amount){let r={id:crypto.randomUUID(),swimmerId,date:d,amount,rememberPrice:true,createdAt:new Date().toISOString()};state.attendance.push(r);state.transactions.push({id:crypto.randomUUID(),swimmerId,attendanceId:r.id,type:'attendance',amount:-amount,date:d+'T12:00:00+08:00',label:'英才門票',reason:'',createdAt:new Date().toISOString()})}
async function price(id,v){let a=Number(v);if(!Number.isInteger(a)||a<=0)return;let r=state.attendance.find(x=>x.id===id);r.amount=a;let tx=state.transactions.find(x=>x.attendanceId===id);if(tx)tx.amount=-a;sw(r.swimmerId).usualPrice=a;await save()}
function pending(){let ps=state.pendingPayments.filter(p=>p.status==='pending').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return '<div class=card><h3>待確認</h3>'+(ps.length?ps.map(p=>'<div class=row><div><div class=name>'+esc(sw(p.swimmerId).name)+' <span class=pill>MOP '+p.amount+'</span></div><div class=sub>'+dt(p.createdAt)+'</div></div><div>'+B('conf',p.id,'確認')+' '+B('rej',p.id,'拒絕','bad')+'</div></div>').join(''):'<div class=empty>沒有待確認入數。</div>')+'</div>'}
async function conf(id){let p=state.pendingPayments.find(x=>x.id===id);p.status='confirmed';p.confirmedAt=new Date().toISOString();state.transactions.push({id:crypto.randomUUID(),swimmerId:p.swimmerId,pendingPaymentId:p.id,type:'payment',amount:p.amount,date:p.confirmedAt,label:'MP payment',reason:'',createdAt:p.confirmedAt});await save();render()}
async function rej(id){let p=state.pendingPayments.find(x=>x.id===id);p.status='rejected';p.rejectedAt=new Date().toISOString();await save();render()}
function balances(){let rows=[...state.swimmers].sort((a,b)=>bal(a.id)-bal(b.id)).filter(s=>s.name.includes(search));return '<div class=card><h3>結餘</h3><input placeholder="搜尋泳員" value="'+esc(search)+'" oninput="search=this.value;render()"></div><div class=card>'+rows.map(s=>{let b=bal(s.id);return '<div class=row><div><div class=name>'+esc(s.name)+(s.archived?' <span class=pill>已封存</span>':'')+'</div><div class=sub>常用票價 MOP '+s.usualPrice+'</div></div><div><div class="amt '+(b<0?'neg':b>0?'pos':'zero')+'">'+(b>0?'+':'')+'MOP '+b+'</div>'+B('manual',s.id,'新增交易')+'</div><div class=detail>'+ledger(s.id,false)+'</div></div>'}).join('')+'</div>'}
async function manual(id){let type=prompt('類型: payment / refund / credit / charge','payment');let a=Number(prompt('金額'));let reason=prompt('原因','');if(!Number.isInteger(a)||a<=0||!reason)return alert('請輸入金額和原因');let amount=(type==='refund'||type==='charge')?-a:a;if(type==='refund'&&a>Math.max(0,bal(id)))return alert('退款不可多於現有正結餘');state.transactions.push({id:crypto.randomUUID(),swimmerId:id,type:type==='credit'||type==='charge'?'correction':type,amount,date:new Date().toISOString(),label:type,reason,createdAt:new Date().toISOString()});await save();render()}
function message(){let out=msg(month);return '<div class=card><h3>每月收款訊息</h3><input type=month value="'+month+'" onchange="month=this.value;render()"></div><div class=card><textarea id=mtext style="min-height:260px" readonly>'+esc(out)+'</textarea><br><br><button onclick="copyMsg()">複製</button></div>'} function copyMsg(){navigator.clipboard.writeText(document.querySelector('#mtext').value)}
function settings(){return '<div class=card><h3>設定</h3><button onclick="chgPin()">更改 PIN</button><p class=sub>'+api+'</p></div><div class=card>'+state.swimmers.map(s=>'<div class=row><div><div class=name>'+esc(s.name)+'</div><div class=sub>'+ (s.archived?'已封存':'活躍') +' · MOP '+s.usualPrice+'</div></div><div>'+B('editSw',s.id,'編輯','ghost')+' '+B('arch',s.id,s.archived?'恢復':'封存','bad')+'</div></div>').join('')+'</div>'}
async function editSw(id){let s=sw(id),n=prompt('姓名',s.name),p=Number(prompt('常用票價',s.usualPrice));if(!n||!Number.isInteger(p)||p<=0)return;if(state.swimmers.some(x=>x.id!==id&&x.name===n))return alert('已有相同姓名');s.name=n;s.usualPrice=p;await save();render()} async function arch(id){sw(id).archived=!sw(id).archived;await save();render()} async function chgPin(){let old=prompt('現有 PIN');if(old!==state.pin)return alert('PIN 不正確');let np=prompt('新 PIN');if(!np||np.length<3)return;state.pin=np;await save(old);pin=np;localStorage.kapokPin=np;render()}
async function save(p=pin){state=(await post('saveState',{state},p)).state}
function sw(id){return state.swimmers.find(s=>s.id===id)||{name:'?'}} function att(id,d){return state.attendance.find(r=>r.swimmerId===id&&r.date===d)} function bal(id,end){return state.transactions.filter(t=>t.swimmerId===id&&(!end||new Date(t.date)<=end)).reduce((s,t)=>s+t.amount,0)} function pend(id){return state.pendingPayments.filter(p=>p.swimmerId===id&&p.status==='pending').reduce((s,p)=>s+p.amount,0)}
function visible(){let cut=Date.now()-60*864e5;return state.swimmers.map(swimmer=>({swimmer,balance:bal(swimmer.id),pendingTotal:pend(swimmer.id),last:last(swimmer.id)})).filter(x=>x.balance!==0||x.pendingTotal||x.last>=cut).sort((a,b)=>a.balance<0&&b.balance<0?a.balance-b.balance:a.balance>0&&b.balance>0?b.balance-a.balance:a.balance<0?-1:b.balance<0?1:a.balance>0?-1:b.balance>0?1:0)}
function active(){return state.swimmers.filter(s=>!s.archived).sort((a,b)=>spend30(b.id)-spend30(a.id)||last(b.id)-last(a.id)||a.order-b.order)} function spend30(id){let cut=Date.now()-30*864e5;return state.transactions.filter(t=>t.swimmerId===id&&t.type==='attendance'&&new Date(t.date)>=cut).reduce((s,t)=>s+Math.abs(t.amount),0)} function last(id){let ds=state.attendance.filter(r=>r.swimmerId===id).map(r=>new Date(r.date+'T12:00:00+08:00').getTime());return ds.length?Math.max(...ds):0}
function ledger(id,recent){let months=[new Date().toISOString().slice(0,7)];let d=new Date();d.setMonth(d.getMonth()-1);months.push(d.toISOString().slice(0,7));let rows=[...state.transactions.filter(t=>t.swimmerId===id&&(!recent||months.includes(t.date.slice(0,7)))),...state.pendingPayments.filter(p=>p.swimmerId===id&&p.status==='pending').map(p=>({date:p.createdAt,label:'待確認',amount:p.amount,reason:''}))].sort((a,b)=>new Date(b.date)-new Date(a.date));return rows.length?rows.map(r=>'<div class=line><span>'+r.date.slice(5,10)+'</span><span>'+esc(r.label)+(r.reason?' · '+esc(r.reason):'')+'</span><b class="'+(r.amount<0?'neg':'pos')+'">'+(r.amount<0?'-':'+')+'MOP '+Math.abs(r.amount)+'</b></div>').join(''):'<div class=empty>沒有紀錄。</div>'}
function msg(m){let [y,mo]=m.split('-').map(Number),end=new Date(Date.UTC(y,mo,0,15,59,59)),rows=state.swimmers.map(s=>({s,b:bal(s.id,end)})).filter(x=>x.b<0).sort((a,b)=>a.b-b.b),lines=[y+'年'+mo+'月份英才門票。'];rows.forEach(x=>lines.push(x.s.name+'尚欠'+(-x.b)+'元'));lines.push('','請大家MP轉給我。','入數後請到以下連結登記金額，待教練確認：',parentLink,'註了名不用再給訊息');return lines.join(String.fromCharCode(10))}
function today(){return new Date().toISOString().slice(0,10)} function defaultDate(){let d=new Date();while(![0,1,4].includes(d.getDay()))d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)} function isSwim(x){let d=new Date(x+'T12:00:00+08:00');return x<=today()&&[0,1,4].includes(d.getDay())} function dt(x){return new Intl.DateTimeFormat('zh-Hant-MO',{timeZone:TZ,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(x))}
</script></body></html>
